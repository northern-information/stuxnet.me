      url: https://www.iheart.com/artist/stuxnet-610225/albums/fade-scatter-replicate-209167992/
    - title: SPOTIFY
      url: https://open.spotify.com/album/2lYuoDyy8iFJ54pGXGBBXT?si=iOgtc0qyRSCi2UnSU-tfFQ
    - title: TIDAL
      url: https://listen.tidal.com/album/283738233
    - title: YOUTUBE
      url: https://www.youtube.com/watch?v=maPhkV6wzLk
  notesHtml: |
    <p>Migrants are often between two worlds that do not really have a place for them: fleeing economic or political hardship and entering a place (ostensibly the U.S.) that fundamentally demands their labour yet officially outlaws them and treats them as sub-human. The coyote is doing a kind of extraordinary favor by rendering an extra-legal service, and putting themselves in harm's way to do so.</p><p>Why choose this particular job?</p><p>Perhaps because the coyote is "between," themselves. This casts them as a kind of archetypical shamanistic figure: a psychopomp, a guide of souls like Anubis, Charon, Hermes, Mercury, or Tarkovsky's Stalker. But, unlike this Jungian pantheon of tricksters, our coyote is not bound by divinity or magicks — they are a mercenary; they are bound by cash.</p><p>In Nomadology: The War Machine, Deleuze & Guattari "redefine the relation between the state and its war machine. Far from being a part of the state, warriors (the army) are nomads who always come from the outside and keep threatening the authority of the state. In the same vein, nomadic science keeps infiltrating royal science, undermining its axioms and principles. Nomadology is a speedy, pocket-sized treatise that refuses to be pinned down. Theorizing a dynamic relationship between sedentary power and schizophrenic lines of flight, this volume is meant to be read in transit, smuggled into urban nightclubs, offices, and subways."</p><p>It then follows the special economic zone is a stage for our coyote, our trickster, to turn logics and fortunes of capitalism inside out and upside down. The interior shared-self which persists through ultra time flow is, yes: dancing in place to move forward... and the special economic zone suspends the rules to incentivize a certain dancing, a particular folding back into itself to realize commerce, competition, fucking, running, transgressing, renewing.</p><p>If the trickster makes this world, it follows the mercenary makes the state. </p>
  creditsHtml: |
    <p>Précis by Cory Salveson. Music by Tyler Etters.</p><p>Selected samples: Dark Souls III, Mission: Impossible 4 – Ghost Protocol, X-Files, Metal Gear Solid, Underoath, Fortnite "Fracture" Event, Black Hawk Down.</p><p>Inspired by a trip with my mother to Tijuana, Mexico, 2022.</p><p>Album art: Midjourney prompt by John von Seggern.</p><p>For Timm.</p>

- title: HUMAN INTERFERENCE TASK FORCE
  image: human-interference-task-force.jpg
  date: 2021-07-26
  tracks:
    - that it is a message at all
    - that dangerous material is stored in a given location
    - information about the type of dangerous substances
  links:
    - title: AMAZON
      url: https://www.amazon.com/HUMAN-INTERFERENCE-TASK-FORCE-Stuxnet/dp/B09B95F4PR
    - title: APPLE MUSIC / ITUNES
      url: https://music.apple.com/us/album/human-interference-task-force/1578424297
