- title: IN DARKNESS RADIANT
  image: in-darkness-radiant.jpg
  date: 2023-12-21
  tracks:
    - Tiresias
    - In Darkness Radiant
    - Temporary Autonomous Zone
    - Hell Money
    - Subsea Fiber Faults in the APAC Region
    - Safe Passage (Non-Functional)
  links:
    - title: BANDCAMP
      url: https://stuxnet.bandcamp.com/album/in-darkness-radiant
  notesHtml: |
    <p>After a harrowing border crossing out of the Special Economic Zone, Coyote lies low. His world is hardened, Metal Gear, long drag of cigarette, pushing limits of body to transport mind. Licking his wounds, drinking warm Modelo, watching cargo ships queue up for port, he contemplates getting out of the game for good.</p><p>But when money runs out (like it always does) he's forced to accept an impossible gig: US/APAC. The cargo is a Tiresias figure, some aged clarivoyant who, having struck their staff at two copulating serpents, was then blinded, given the gift of prophecy (visions), and transformed into a woman for seven years.</p><p>Who seeks a strange country by illegal means that can only place them perpetually outside while also inside? Coyote knows: someone who has a message... or someone who is one. What is the message now? What does Tiresias only know while blind and femme?</p><p>Coyote's reference gear attempts to help his line of thought with encyclopedic minutiae: "Like with other oracles, how Tiresias obtained their information varied: sometimes, they would receive visions; other times they would listen for the songs of birds, or ask for a description of visions and pictures appearing within the smoke of burnt offerings or entrails, and so interpret them. Pliny the Elder credits Tiresias with the invention of augury. Tiresias has a daughter, Manto, who is also a prophetess and priestess."</p><p>Simple machine that cannot breathe or ache. Coyote dictates futile corrections to his gear. This Oracle of Zones is a mother, alright. The twin Zones -  both Special Economic and Temporary Autonomous - symbolize invitations by their respective hosts to become changed; to be shown wrong. High on artificial fumes in virtual caves, Tiresias (pregnant with Manto?) are illegal yet invited; necessary; load-bearing. She sees and listens, assembles, then tells. And she's coming now, changing Self to change the flow of things, money, talk, data. She dies but goes on. A programming program, in darkness radiant.</p><p>A seagull lands on the railing.</p><p>Zip-tied to its tibia is a white USB drive.</p><p>It is branded with a familiar hexagon.</p>
  creditsHtml: |
    <p>Précis by Cory Salveson. Music by Tyler Etters.</p><p>Selected samples: Bauenrfeind, Beast Wars, Elden Ring, Cornell Lab of Ornithology, The Amity Affliction, Predator, True Detective, Cory's field recordings from China.</p><p>The musician would like to express his deepest thanks to @zbs for their deft consultation on the final mix and unwavering devotion to sub-bass.</p><p>Album art: screencap from "Can't Get You Out of My Head" by Adam Curtis.</p>

- title: FADE SCATTER REPLICATE
  image: fade-scatter-replicate.jpg
  date: 2023-03-20
  tracks:
    - Sources & Methods
    - Coyote
    - Special Economic Zone
    - Border Crossing
    - In Infinite Fogs
  links:
    - title: AMAZON
      url: https://www.amazon.com/music/player/albums/B0BZ38K762
    - title: APPLE MUSIC / ITUNES
      url: https://music.apple.com/us/album/fade-scatter-replicate-ep/1678223798?uo=4&app=music&at=1001lry3&ct=dashboard
    - title: BANDCAMP
      url: https://stuxnet.bandcamp.com/album/fade-scatter-replicate
    - title: DEEZER
      url: https://www.deezer.com/album/419915087
