<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ site.title }} | {{ site.description }}</title>

<!-- seo -->
<meta name="generator" content="Jekyll v4.0.0" />
<meta property="og:title" content="{{ site.title }} | {{ site.description }}" />
<meta property="og:locale" content="en_US" />
<meta name="description" content="{{ site.title }} | {{ site.description }}" />
<meta property="og:description" content="{{ site.title }} | {{ site.description }}" />
<link rel="canonical" href="https://stxunet.me/" />
<meta property="og:url" content="https://stxunet.me/" />
<meta property="og:site_name" content="STUXNET" />
<script type="application/ld+json">{"description":"{{ site.description }}","@type":"WebSite","url":"https://stxunet.me/","name":"{{ site.title }}","headline":"{{ site.title }}","@context":"https://schema.org"}</script>
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@tyleretters">
<meta name="twitter:creator" content="@tyleretters">
<meta name="twitter:title" content="{{ site.title }} | {{ site.description }}">
{% if page.url %}<meta name="twitter:url" content="{{ site.url }}{{ page.url }}">{% endif %}
{% if page.excerpt %}<meta name="twitter:description" content="{{ page.excerpt | strip_html }}">{% else %}<meta name="twitter:description" content="{{ site.description }}">{% endif %}
<meta name="twitter:image:src" content="{{ site.url }}/assets/images/profile.jpg">  

<!-- style -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
<link rel="stylesheet" href="{{ "/assets/stylesheets/style.css" | relative_url }}?{{site.time | date: '%s%N'}}">
<link rel="apple-touch-icon-precomposed" href="/apple-touch-icon.png" />
<link rel="shortcut icon" href="/favicon.ico?v=1" />
<link rel="mask-icon" href="/mask-icon.svg" color="#ffffff">

<!-- feed -->
{% feed_meta %}
</head>
